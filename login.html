<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nexus - Connexion</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    /* ===== NEXUS EDITION - COULEURS UNIFIÉES ===== */
    :root {
      --primary: #B76EFF;
      --primary-dark: #8B3FE8;
      --primary-light: #D4A1FF;
      --primary-glow: rgba(183, 110, 255, 0.35);
      --bg-dark: #030305;
      --bg-medium: #08080F;
      --bg-light: #0F0F1A;
      --text-light: #FFFFFF;
      --text-dim: #8B90A8;
      --card-bg: rgba(15, 15, 26, 0.85);
      --card-border: rgba(183, 110, 255, 0.08);
      --card-border-hover: rgba(183, 110, 255, 0.25);
      --success: #2EE89A;
      --warning: #FFD166;
      --danger: #FF4D6D;
      --shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.9);
      --shadow-glow: 0 0 40px rgba(183, 110, 255, 0.2);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --glass-bg: rgba(183, 110, 255, 0.04);
      --glass-border: rgba(183, 110, 255, 0.07);
      --grain-opacity: 0.035;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    /* Grain Texture */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 9999;
      pointer-events: none;
      opacity: var(--grain-opacity);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
    }

    /* Background avec orbes */
    .gradient-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      background:
        radial-gradient(ellipse 60% 50% at 15% 20%, rgba(139, 63, 232, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 75%, rgba(183, 110, 255, 0.12) 0%, transparent 55%),
        radial-gradient(ellipse 40% 60% at 50% 50%, rgba(8, 8, 20, 0.6) 0%, transparent 80%),
        linear-gradient(180deg, #030305 0%, #05051A 50%, #030305 100%);
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      pointer-events: none;
      animation: orbFloat 8s ease-in-out infinite;
    }

    .orb-1 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(139, 63, 232, 0.15), transparent 70%);
      top: -100px; left: -100px;
    }

    .orb-2 {
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(183, 110, 255, 0.1), transparent 70%);
      bottom: 20%; right: -80px;
      animation-delay: -4s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -20px) scale(1.05); }
      66% { transform: translate(-15px, 15px) scale(0.95); }
    }

    /* Container de connexion */
    .auth-container {
      width: 100%;
      max-width: 460px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 32px;
      padding: 40px 28px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      z-index: 10;
      animation: slideInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-dark), var(--primary-light));
    }

    /* Logo Nexus */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
      text-decoration: none;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 50%, var(--primary-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: nexusGlow 3s ease-in-out infinite;
    }

    @keyframes nexusGlow {
      0%, 100% {
        filter: brightness(1) drop-shadow(0 0 0px rgba(183, 110, 255, 0));
      }
      50% {
        filter: brightness(1.3) drop-shadow(0 0 12px rgba(183, 110, 255, 0.5));
      }
    }

    .logo-text {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(135deg, var(--text-light), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-transform: uppercase;
      font-style: italic;
    }

    /* Titre */
    .title {
      text-align: center;
      margin-bottom: 32px;
    }

    .title h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .title h1 span {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .title p {
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 500;
    }

    /* Switch Connexion (Nom / Email) */
    .login-option {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      background: rgba(183, 110, 255, 0.03);
      border-radius: 18px;
      padding: 4px;
    }

    .login-option-btn {
      flex: 1;
      text-align: center;
      padding: 12px;
      background: transparent;
      border: none;
      border-radius: 14px;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .login-option-btn i {
      margin-right: 6px;
    }

    .login-option-btn.active {
      background: rgba(183, 110, 255, 0.12);
      color: var(--primary-light);
      border: 1px solid rgba(183, 110, 255, 0.2);
    }

    /* Formulaires */
    .form-group {
      margin-bottom: 22px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .form-label i {
      color: var(--primary);
      margin-right: 6px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 14px;
      transition: var(--transition);
    }

    .form-input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      background: rgba(183, 110, 255, 0.04);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      color: var(--text-light);
      font-size: 14px;
      font-weight: 500;
      transition: var(--transition);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(183, 110, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(183, 110, 255, 0.1);
    }

    .form-input:focus + .input-icon {
      color: var(--primary);
    }

    /* Bouton */
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border: none;
      border-radius: 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 28px;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 20px rgba(139, 63, 232, 0.3);
    }

    .submit-btn:active {
      transform: scale(0.97);
      opacity: 0.92;
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Loader */
    .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Liens */
    .auth-links {
      text-align: center;
      margin-top: 24px;
    }

    .auth-links a {
      color: var(--primary-light);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: var(--transition);
    }

    .auth-links a:active {
      opacity: 0.7;
    }

    .auth-links span {
      color: var(--text-dim);
      margin: 0 8px;
    }

    /* Notification */
    .notification {
      position: fixed;
      bottom: 24px;
      left: 16px;
      right: 16px;
      max-width: 420px;
      margin: 0 auto;
      background: rgba(8, 8, 20, 0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(183, 110, 255, 0.3);
      border-radius: 20px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 1000;
      transform: translateY(120px);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .notification.show {
      transform: translateY(0);
    }

    .notification-icon {
      width: 44px;
      height: 44px;
      background: rgba(183, 110, 255, 0.12);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-size: 20px;
      flex-shrink: 0;
      border: 1px solid rgba(183, 110, 255, 0.15);
    }

    .notification-content h4 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .notification-content p {
      font-size: 12px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>

  <div class="gradient-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Notification toast -->
  <div class="notification" id="notification">
    <div class="notification-icon">
      <i class="fas fa-gem"></i>
    </div>
    <div class="notification-content">
      <h4 id="notificationTitle">Nexus</h4>
      <p id="notificationMessage">Connectez-vous à votre espace</p>
    </div>
  </div>

  <div class="auth-container">
    <a href="index.html" class="logo">
      <div class="logo-icon">N</div>
      <div class="logo-text">NEXUS</div>
    </a>

    <div class="title">
      <h1>Connexion <span>Nexus</span></h1>
      <p>Accédez à votre plateforme d'investissement</p>
    </div>

    <div class="login-option">
      <button type="button" class="login-option-btn active" data-type="name">
        <i class="fas fa-user"></i> Nom
      </button>
      <button type="button" class="login-option-btn" data-type="email">
        <i class="fas fa-envelope"></i> Email
      </button>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" id="loginLabel">
          <i class="fas fa-user"></i>
          Votre nom
        </label>
        <div class="input-wrapper">
          <i class="fas fa-user input-icon" id="loginIcon"></i>
          <input type="text" id="loginInput" class="form-input" 
                 placeholder="Ex: Alpha Diallo" autocomplete="off" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">
          <i class="fas fa-lock"></i>
          Code secret
        </label>
        <div class="input-wrapper">
          <i class="fas fa-key input-icon"></i>
          <input type="password" id="password" class="form-input" 
                 placeholder="Entrez votre code" autocomplete="off" required>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i>
        <span>Se connecter</span>
      </button>

      <div class="auth-links">
        <a href="register.html">Créer un compte</a>
        <span>•</span>
        <a href="index.html">Accueil</a>
      </div>
    </form>
  </div>

  <script>
    // ============================================
    // NEXUS LOGIN SYSTEM
    // ============================================
    let loginType = 'name'; // 'name' or 'email'

    // Éléments DOM
    const loginLabel = document.getElementById('loginLabel');
    const loginInput = document.getElementById('loginInput');
    const loginIcon = document.getElementById('loginIcon');
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const notification = document.getElementById('notification');
    const notificationTitle = document.getElementById('notificationTitle');
    const notificationMessage = document.getElementById('notificationMessage');

    // ============================================
    // BASCULE NOM / EMAIL
    // ============================================
    document.querySelectorAll('.login-option-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.login-option-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        loginType = this.dataset.type;
        
        if (loginType === 'name') {
          loginLabel.innerHTML = '<i class="fas fa-user"></i> Votre nom';
          loginInput.placeholder = 'Ex: Alpha Diallo';
          loginIcon.className = 'fas fa-user input-icon';
        } else {
          loginLabel.innerHTML = '<i class="fas fa-envelope"></i> Votre email';
          loginInput.placeholder = 'exemple@nexus.com';
          loginIcon.className = 'fas fa-envelope input-icon';
        }
        loginInput.value = '';
      });
    });

    // ============================================
    // FONCTIONS UTILITAIRES
    // ============================================
    function showNotification(title, message, isError = false) {
      notificationTitle.textContent = title;
      notificationMessage.textContent = message;
      
      const iconDiv = notification.querySelector('.notification-icon i');
      if (isError) {
        iconDiv.className = 'fas fa-exclamation-triangle';
        notification.style.borderLeftColor = 'var(--danger)';
      } else {
        iconDiv.className = 'fas fa-gem';
        notification.style.borderLeftColor = 'var(--primary)';
      }
      
      notification.classList.add('show');
      setTimeout(() => {
        notification.classList.remove('show');
      }, 3500);
    }

    function setLoading(isLoading) {
      if (isLoading) {
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="loader"></span><span> Connexion...</span>';
      } else {
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i><span>Se connecter</span>';
      }
    }

    // ============================================
    // RECHERCHE UTILISATEUR DANS LOCALSTORAGE
    // ============================================
    function findUserByIdentifier(identifier, type) {
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith('vexis_user_')) {
          try {
            const user = JSON.parse(localStorage.getItem(key));
            if (type === 'name' && user.name && user.name.toLowerCase() === identifier.toLowerCase()) {
              return { id: key.replace('vexis_user_', ''), data: user };
            }
            if (type === 'email' && user.email && user.email.toLowerCase() === identifier.toLowerCase()) {
              return { id: key.replace('vexis_user_', ''), data: user };
            }
          } catch (e) {
            console.warn('Parse error on key:', key);
          }
        }
      }
      return null;
    }

    // ============================================
    // TRAITEMENT CONNEXION
    // ============================================
    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      
      const identifier = loginInput.value.trim();
      const password = document.getElementById('password').value;
      
      if (!identifier) {
        showNotification('Champ requis', loginType === 'name' ? 'Entrez votre nom' : 'Entrez votre email', true);
        return;
      }
      
      if (!password) {
        showNotification('Code requis', 'Veuillez entrer votre code secret', true);
        return;
      }
      
      setLoading(true);
      
      // Simulation légère pour l'effet
      setTimeout(() => {
        try {
          const userFound = findUserByIdentifier(identifier, loginType);
          
          if (!userFound) {
            showNotification('Accès refusé', loginType === 'name' ? 'Nom non trouvé' : 'Email non trouvé', true);
            setLoading(false);
            return;
          }
          
          // Vérification du mot de passe
          if (userFound.data.password !== password) {
            showNotification('Code incorrect', 'Le code saisi est invalide', true);
            setLoading(false);
            return;
          }
          
          // Connexion réussie
          localStorage.setItem('vexis_current_user', userFound.id);
          
          // Mise à jour de la dernière connexion
          userFound.data.lastLogin = new Date().toISOString();
          localStorage.setItem(`vexis_user_${userFound.id}`, JSON.stringify(userFound.data));
          
          showNotification('Bienvenue sur Nexus', `Bon retour ${userFound.data.name} !`);
          
          // Redirection vers l'accueil
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1400);
          
        } catch (error) {
          console.error('Erreur:', error);
          showNotification('Erreur système', 'Veuillez réessayer', true);
          setLoading(false);
        }
      }, 900);
    });

     // ============================================
    // VÉRIFICATION SI DÉJÀ CONNECTÉ
    // ============================================
    (function checkAlreadyLoggedIn() {
      const userId = localStorage.getItem('vexis_current_user');
      if (userId) {
        try {
          const userDataRaw = localStorage.getItem(`vexis_user_${userId}`);
          if (userDataRaw) {
            const user = JSON.parse(userDataRaw);
            if (confirm(`⚡ Déjà connecté en tant que "${user.name}".\nSouhaitez-vous continuer sur votre espace ?`)) {
              window.location.href = 'index.html';
            } else {
              localStorage.removeItem('vexis_current_user');
            }
          } else {
            localStorage.removeItem('vexis_current_user');
          }
        } catch (e) {
          localStorage.removeItem('vexis_current_user');
        }
      }
    })();

    // Petite animation focus sur input
    const inputs = document.querySelectorAll('.form-input');
    inputs.forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.querySelector('.input-icon')?.classList.add('text-primary');
      });
      input.addEventListener('blur', function() {
        this.parentElement.querySelector('.input-icon')?.classList.remove('text-primary');
      });
    });
  </script>
</body>
</html>
